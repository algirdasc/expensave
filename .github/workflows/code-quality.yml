name: "Code quality"

on:
  workflow_call:
  pull_request:

env:
  DATABASE_HOST: 127.0.0.1

jobs:
  backend-code-quality:
    name: Backend code quality checks
    runs-on: ubuntu-24.04
    services:
      database:
        image: mariadb:10.6
        env:
          MARIADB_RANDOM_ROOT_PASSWORD: yes
          MARIADB_USER: expensave
          MARIADB_PASSWORD: expensave
          MARIADB_DATABASE: expensave_test
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: 'backend/'
          sparse-checkout-cone-mode: false
      - name: Move backend to root
        run: |
          shopt -s dotglob
          mv backend/* ./
          rm -rf backend/
          mkdir -p ./var/cache
          mkdir -p ./var/log
          chmod 775 ./var/cache
          chmod 775 ./var/log
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, gd, iconv, zip, intl, mbstring, curl, pdo, pdo_mysql, sysvsem, dom
          coverage: xdebug
          tools: composer:v2
      - name: Show PHP version
        run: php -v
      - name: Packages install
        run: composer install --profile --no-interaction --no-progress
#      - name: Run PHPCS
#        uses: php-actions/phpcs@v1
#        with:
#          path: ./src/
#          args: -d memory_limit=-1
      - name: Warmup cache for PHPStan
        run: php bin/console cache:warmup -n --env=dev
      - name: Run PHPStan
        env:
          APP_ENV: dev
        run: vendor/bin/phpstan analyse
      - name: Create schema for testing
        run: php bin/console doctrine:schema:create -n --env=test
      - name: Run PHPUnit
        env:
          XDEBUG_MODE: coverage
        run: php bin/phpunit --coverage-clover coverage.xml --log-junit report.xml

  frontend-code-quality:
    name: Frontend code quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .nvmrc
            frontend/
          sparse-checkout-cone-mode: false
      - name: Move frontend to root
        run: |
          shopt -s dotglob
          mv frontend/* ./
          rm -rf frontend/
          ls -lah
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Packages Install
        run: npm ci
      - name: Run ESLint
        run: npm run analyze

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .nvmrc
            frontend/
          sparse-checkout-cone-mode: false
      - name: Move frontend to root
        run: |
          shopt -s dotglob
          mv frontend/* ./
          rm -rf frontend/
          ls -lah
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Packages Install
        run: npm ci
      - name: Run frontend tests
        run: npm test
