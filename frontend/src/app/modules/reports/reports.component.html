<nb-layout>
    <nb-layout-header fixed>
        <div class="d-flex justify-content-between align-items-center w-100">
            <h1 class="m-0"><nb-icon class="text-hint" icon="bar-chart-outline" /> Reports</h1>

            <nb-icon icon="close-outline" size="giant" routerLink="/calendar" class="actionable" />
        </div>
    </nb-layout-header>

    <nb-layout-column class="p-0 p-md-3">
        <nb-card class="mb-0 h-100 border-0">
            <nb-card-body>
                <div class="d-md-flex">
                    <div class="calendar-selection">
                        <h6 class="text-hint m-3">Calendars:</h6>
                        <nb-list class="mb-3">
                            @for (calendar of calendars; track calendar.id) {
                                <nb-list-item>
                                    <nb-checkbox
                                        [checked]="selectedCalendarMap[calendar.id]"
                                        (checkedChange)="onCheckedChange(calendar, $event)"
                                        class="text-truncate">
                                        {{ calendar.name }}
                                    </nb-checkbox>
                                </nb-list-item>
                            }
                        </nb-list>
                    </div>
                    <div class="flex-grow-1">
                        <app-reports-daily-expenses class="d-block mb-3" />
                        <app-reports-monthly-expenses class="d-block mb-3" />
                        <app-reports-category-expenses />
                    </div>
                </div>
            </nb-card-body>
        </nb-card>
    </nb-layout-column>
</nb-layout>
