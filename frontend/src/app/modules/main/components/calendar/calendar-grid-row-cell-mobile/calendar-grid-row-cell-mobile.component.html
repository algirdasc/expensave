<div class="cell pe-1 text-right no-user-selection actionable">
    <div class="d-flex align-items-center justify-content-end mb-1">
        @if (hasUnconfirmedExpenses) {
            <div class="unconfirmed-expenses me-2"></div>
        }
        <strong>{{ day }}</strong>
    </div>
    @if (balance?.change || (balance && isCellSelected)) {
        <small class="d-block">
            {{ balance.change | shortNumber: '.0-0' }}
        </small>
    }
    @if (balance?.balance || (balance && isCellSelected)) {
        <small class="d-block">
            {{ balance.balance | shortNumber: '.0-0' }}
        </small>
    }
</div>
