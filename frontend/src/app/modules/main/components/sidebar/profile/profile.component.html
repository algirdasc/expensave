<div class="profile-row d-flex align-items-center justify-content-between gap-2">
    <nb-user
        class="profile-user flex-fill text-truncate"
        [name]="user.name"
        [picture]="user.avatar"
        [title]="user.email" />
    <button
        nbButton
        type="button"
        ghost
        size="small"
        status="basic"
        class="theme-preference-button flex-shrink-0"
        [attr.aria-label]="'Theme preference: ' + themeLabel"
        [nbContextMenu]="themeMenuItems"
        nbContextMenuTag="theme-preference"
        [nbContextMenuPlacement]="contextMenuPlacement"
        nbTooltip="Theme">
        <nb-icon [icon]="themeIcon" />
    </button>
</div>
