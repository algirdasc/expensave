<div class="d-flex align-items-center justify-content-between">
    <nb-user class="w-100 text-truncate" [name]="user.name" [picture]="user.avatar" [title]="user.email" />
    <div style="width: 80px">
        <button nbButton ghost size="small" status="primary" (click)="showProfileDialog()">
            <nb-icon icon="person-outline" />
        </button>
        <button nbButton ghost size="small" status="danger" (click)="showLogoutConfirmDialog()">
            <nb-icon icon="log-out-outline" />
        </button>
    </div>
</div>
