<nb-card class="dialog" size="large">
    <nb-card-header class="d-flex align-items-center">
        <button
            nbButton
            type="button"
            status="basic"
            ghost
            aria-label="Back from category selection"
            nbTooltip="Back"
            (click)="back.emit()"
            class="me-3">
            <nb-icon icon="arrow-back-outline" />
        </button>
        Select category
    </nb-card-header>
    <nb-list>
        @for (category of categories; track category.id) {
            <nb-list-item
                class="actionable"
                [@slideAnimation]
                [class.active]="selectedCategoryId === category.id"
                [style.background-color]="selectedCategoryId === category.id ? category.color : ''"
                (click)="categoryClick.emit(category)">
                <nb-icon
                    icon="radio-button-on"
                    class="flex-shrink-0 me-2"
                    [style.color]="selectedCategoryId === category.id ? '' : category.color" />
                <div class="text-truncate">{{ category.name }}</div>
            </nb-list-item>
        }
    </nb-list>
    <nb-card-footer class="d-flex justify-content-end">
        <button nbButton type="button" status="primary" ghost (click)="newCategoryClick.emit(true)">
            <nb-icon icon="plus" /> Add category
        </button>
    </nb-card-footer>
</nb-card>
