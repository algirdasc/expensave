<nb-card class="dialog">
    <nb-card-header class="d-flex align-items-center">
        <button nbButton type="button" status="primary" ghost (click)="back.emit(true)" class="me-3">
            <nb-icon icon="arrow-back-outline" />
        </button>
        Select calendar
    </nb-card-header>
    <nb-list>
        @for (calendar of calendars; track $index) {
            <nb-list-item
                [@slideAnimation]
                class="actionable"
                [class.active]="selectedCalendarId === calendar.id"
                (click)="calendarClick.emit(calendar)">
                <nb-icon
                    [icon]="selectedCalendarId === calendar.id ? 'radio-button-on' : 'radio-button-off'"
                    [style]="selectedCalendarId === calendar.id ? 'primary' : ''"
                    class="flex-shrink-0 me-2" />
                <div class="text-truncate">{{ calendar.name }}</div>
            </nb-list-item>
        }
    </nb-list>
    <nb-card-footer class="text-right">
        <button nbButton type="button" status="primary" ghost (click)="newCalendarClick.emit(true)">
            <nb-icon icon="plus" /> Add calendar
        </button>
    </nb-card-footer>
</nb-card>
