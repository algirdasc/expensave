<nb-layout [nbSpinner]="isApplicationBusy">
    <nb-layout-header fixed>
        <app-header
            [calendar]="mainService.calendar"
            [visibleDateBalance]="mainService.visibleDateBalance"
            [visibleDate]="mainService.visibleDate">
        </app-header>
    </nb-layout-header>

    <nb-layout-column
        class="p-0 p-sm-3"
        [nbSpinner]="isCalendarBusy"
        (resized)="onResized($event)"
        appSwipe
        (swipeEnd)="onSwipeEnd($event)">
        <app-calendar-state [isMobile]="isMobile"></app-calendar-state>
    </nb-layout-column>

    <nb-sidebar
        tag="{{ SIDEBAR_TAG }}"
        state="collapsed"
        appOutsideClick
        (outsideClick)="onSidebarOutsideClick($event)">
        <div class="d-flex flex-column h-100 p-3">
            <app-profile [user]="mainService.user"></app-profile>
            <div class="border-bottom my-3"></div>
            <app-sidebar-calendar-list
                [(calendars)]="mainService.calendars"
                [calendar]="mainService.calendar"
                (calendarChange)="mainService.refreshCalendar($event)">
            </app-sidebar-calendar-list>
            <app-sidebar-actions class="mt-auto"></app-sidebar-actions>
        </div>
    </nb-sidebar>
</nb-layout>
