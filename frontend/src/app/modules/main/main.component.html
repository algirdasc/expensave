<nb-layout [nbSpinner]="isApplicationBusy">
    <nb-layout-header fixed>
        <app-header
            [calendar]="mainService.calendar"
            [visibleDateBalance]="mainService.visibleDateBalance"
            [visibleDate]="mainService.visibleDate" />
    </nb-layout-header>

    <nb-layout-column
        class="p-0 p-sm-3"
        [nbSpinner]="isCalendarBusy"
        (resized)="onResized($event)"
        appSwipe
        (swipeEnd)="onSwipeEnd($event)">
        <app-calendar
            [calendar]="mainService.calendar"
            [expenses]="mainService.expenses"
            [expenseBalances]="mainService.expenseBalances"
            [visibleDate]="mainService.visibleDate"
            [selectedDate]="mainService.visibleDate"
            (rangeChange)="onRangeChange($event)"
            [isMobile]="isMobile" />
    </nb-layout-column>

    <nb-sidebar
        tag="{{ SIDEBAR_TAG }}"
        state="collapsed"
        appOutsideClick
        (outsideClick)="onSidebarOutsideClick($event)">
        <div class="d-flex flex-column h-100 p-3">
            <app-profile [user]="mainService.user" />
            <div class="border-bottom my-3"></div>
            <app-sidebar-calendar-list
                [(calendars)]="mainService.calendars"
                [calendar]="mainService.calendar"
                (calendarChange)="onCalendarChange($event)" />
            <app-sidebar-actions class="mt-auto" />
        </div>
    </nb-sidebar>
</nb-layout>
